name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: 減価償却 回帰テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # pgserver は PostgreSQL バイナリを同梱するため、別途 DB を立てる必要はない。
        run: pip install pgserver

      - name: Run all tests
        # tests/test_*.py を全て実行し、1つでも失敗したらジョブを失敗させる。
        run: |
          rc=0
          for t in tests/test_*.py; do
            echo "::group::$t"
            python "$t" || rc=1
            echo "::endgroup::"
          done
          exit $rc
